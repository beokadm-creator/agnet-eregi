casePack:
  id: corp.incorporation
  nameKo: "주식회사 설립등기"
  version: v1

  scope:
    includes:
      - "일반적인 내국인 주주/임원 구성의 주식회사 설립"
    excludes:
      - "현물출자/복잡한 특수정관(별도 사건팩으로 분리 권장)"
      - "외국인 투자/해외 법인 관련(초기엔 manual_review로 라우팅)"
    legalNotes:
      - "본 문서는 플랫폼 운영을 위한 사건팩 초안이며, 실제 제출 서류/절차는 관할·사안에 따라 달라질 수 있음"

  inputForm:
    version: v1
    fields:
      - { key: corpType, labelKo: 법인형태, type: enum, required: true, enum: ["주식회사"] }
      - { key: companyName, labelKo: 상호, type: string, required: true }
      - { key: hqAddress, labelKo: 본점주소, type: string, required: true }
      - { key: capital, labelKo: 자본금(원), type: number, required: true, validation: { min: 1 } }
      - { key: shareholdersCount, labelKo: 주주 수, type: number, required: true, validation: { min: 1 } }
      - { key: officersCount, labelKo: 임원 수, type: number, required: true, validation: { min: 1 } }
      - { key: hasForeignOfficer, labelKo: 외국인/재외국민 임원 포함, type: boolean, required: true }
      - { key: deadlineHours, labelKo: 희망 완료까지 남은 시간(시간), type: number, required: false }
    derivedFields:
      - { key: isUrgent, formula: "deadlineHours != null && deadlineHours <= 72" }

  decisionTree:
    version: v1
    branches:
      - id: B_URGENT
        nameKo: "긴급(72시간 이내)"
        when: { all: [ { field: isUrgent, op: eq, value: true } ] }
        effects:
          depthScoreDelta: 20
          riskFlagsAdd: ["URGENT"]
          slaDeltaHours: -24
          checklistAdd: ["긴급 진행 동의(추가 비용/변동 가능)"]
          documentsAdd: []

      - id: B_FOREIGN
        nameKo: "외국인/재외국민 임원 포함"
        when: { all: [ { field: hasForeignOfficer, op: eq, value: true } ] }
        effects:
          depthScoreDelta: 25
          riskFlagsAdd: ["KYC_STRICT", "DOC_TRANSLATION"]
          slaDeltaHours: 24
          checklistAdd: ["신원/주소/서명 방식 확인"]
          documentsAdd: ["여권 사본(해당 시)", "체류자격/주소 증빙(해당 시)"]

  documents:
    version: v1
    required:
      - { id: D_ARTICLES, nameKo: 정관, type: file, required: true, condition: null, notesKo: "초안 템플릿 제공 가능" }
      - { id: D_OFFICER_CONSENT, nameKo: 임원 취임승낙서, type: file, required: true, condition: null, notesKo: "" }
      - { id: D_SHAREHOLDER_LIST, nameKo: 주주명부, type: file, required: true, condition: null, notesKo: "" }
      - { id: D_SEAL, nameKo: 인감/서명 관련 서류(케이스별), type: file, required: true, condition: null, notesKo: "온라인 진행 방식에 따라 달라짐" }
    optional: []

  checklist:
    version: v1
    items:
      - { id: C_DOCS, phase: 서류수집, titleKo: "필수 서류 업로드", required: true, acceptanceCriteriaKo: "식별 가능, 누락 없음" }
      - { id: C_REVIEW, phase: 검토, titleKo: "서류 검토 통과", required: true, acceptanceCriteriaKo: "오탈자/불일치 없음" }
      - { id: C_SUBMIT, phase: 제출, titleKo: "전자/오프라인 제출 완료", required: true, acceptanceCriteriaKo: "접수번호 확보" }

  workflow:
    version: v1
    states:
      - { id: RECEIVED, nameKo: 접수 }
      - { id: DOC_REQUEST, nameKo: 서류요청 }
      - { id: DOC_RECEIVED, nameKo: 서류수령 }
      - { id: REVIEW, nameKo: 검토/보완 }
      - { id: FILE_SUBMIT, nameKo: 신청/제출 }
      - { id: IN_PROGRESS, nameKo: 처리중 }
      - { id: DONE, nameKo: 완료 }
    transitions:
      - { from: RECEIVED, to: DOC_REQUEST, guard: always }
      - { from: DOC_REQUEST, to: DOC_RECEIVED, guard: allRequiredDocsUploaded }
      - { from: DOC_RECEIVED, to: REVIEW, guard: always }
      - { from: REVIEW, to: FILE_SUBMIT, guard: reviewPassed }
      - { from: FILE_SUBMIT, to: IN_PROGRESS, guard: submissionAccepted }
      - { from: IN_PROGRESS, to: DONE, guard: completionConfirmed }

  sla:
    version: v1
    timers:
      - { id: T_START, nameKo: 착수 SLA, targetHours: 1, breachAction: ESCALATE_OPS }
      - { id: T_COMPLETE, nameKo: 완료 SLA, targetHours: 96, breachAction: ESCALATE_PARTNER }

  scoring:
    version: v1
    baseDepthScore: 40
    riskModel:
      baseRiskScore: 20
      rules:
        - { id: R_URGENT, nameKo: 긴급, when: { all: [ { field: isUrgent, op: eq, value: true } ] }, riskScoreDelta: 20, riskFlagsAdd: ["URGENT"] }
        - { id: R_FOREIGN, nameKo: 외국인 포함, when: { all: [ { field: hasForeignOfficer, op: eq, value: true } ] }, riskScoreDelta: 25, riskFlagsAdd: ["KYC_STRICT"] }

  pricing:
    version: v1
    components:
      - { id: LEGAL_FEES, nameKo: 법정비용, pricingType: pass_through }
      - { id: PROFESSIONAL_FEE, nameKo: 수행자 보수, pricingType: rule_based }
      - { id: PLATFORM_FEE, nameKo: 플랫폼 수수료, pricingType: fixed, amount: 0, currency: KRW }
    adders:
      - { id: ADD_URGENT, nameKo: 긴급 가산, condition: "isUrgent == true", pricingType: rule_based }
      - { id: ADD_FOREIGN, nameKo: 외국인 포함 가산, condition: "hasForeignOfficer == true", pricingType: rule_based }

  assignmentPolicy:
    version: v1
    partnerEligibility:
      allowedPartnerTypes: ["법무법인", "법률사무소"]
      requiredCapabilities: ["corp_registry"]
      regionConstraint: null
    modeRules:
      - { id: M1, when: { all: [ { metric: depthScore, op: lt, value: 60 }, { metric: riskScore, op: lt, value: 50 } ] }, mode: managed }
      - { id: M2, when: { any: [ { metric: depthScore, op: gte, value: 60 }, { metric: riskScore, op: gte, value: 50 } ] }, mode: restricted_bidding, bidding: { inviteCount: 3, responseWindowMinutes: 30 } }
