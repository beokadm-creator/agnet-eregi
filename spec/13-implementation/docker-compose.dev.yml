version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: registry_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d registry_platform"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-01-20T00-00-00Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # api-server:
  #   build: ../../apps/api-server
  #   environment:
  #     DATABASE_URL: postgres://app:app@postgres:5432/registry_platform
  #     S3_ENDPOINT: http://minio:9000
  #     S3_ACCESS_KEY: minio
  #     S3_SECRET_KEY: minio12345
  #     S3_BUCKET: documents-dev
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     minio:
  #       condition: service_started

volumes:
  pgdata:
  miniodata:

