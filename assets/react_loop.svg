<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .title { font: 700 28px 'Noto Sans CJK KR', 'Noto Sans KR', Arial, sans-serif; fill: #111; }
      .label { font: 700 20px 'Noto Sans CJK KR', 'Noto Sans KR', Arial, sans-serif; fill: #111; }
      .small { font: 400 18px 'Noto Sans CJK KR', 'Noto Sans KR', Arial, sans-serif; fill: #111; }
      .boxtext { font: 700 18px 'Noto Sans CJK KR', 'Noto Sans KR', Arial, sans-serif; fill: #0b1a2b; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="#ffffff"/>
  <text x="40" y="60" class="title">ReAct: Thought–Action–Observation을 교차 생성</text>

  <rect x="80" y="190" width="300" height="150" rx="18" fill="#EEF5FF" stroke="#2F5E9E" stroke-width="3"/>
  <text x="230" y="250" text-anchor="middle" class="boxtext">Thought</text>
  <text x="230" y="285" text-anchor="middle" class="small">(추론)</text>

  <rect x="450" y="110" width="300" height="150" rx="18" fill="#EEF5FF" stroke="#2F5E9E" stroke-width="3"/>
  <text x="600" y="170" text-anchor="middle" class="boxtext">Action</text>
  <text x="600" y="205" text-anchor="middle" class="small">(도구/환경)</text>

  <rect x="820" y="190" width="300" height="150" rx="18" fill="#EEF5FF" stroke="#2F5E9E" stroke-width="3"/>
  <text x="970" y="250" text-anchor="middle" class="boxtext">Observation</text>
  <text x="970" y="285" text-anchor="middle" class="small">(관찰/근거)</text>

  <line x1="380" y1="245" x2="450" y2="185" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="415" y="200" text-anchor="middle" class="small">reason → act</text>

  <line x1="750" y1="185" x2="820" y2="245" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="785" y="200" text-anchor="middle" class="small">act → reason</text>

  <path d="M 970 340 C 970 450, 230 450, 230 340" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="600" y="470" text-anchor="middle" class="small">update context (상태/기억 갱신)</text>

</svg>
