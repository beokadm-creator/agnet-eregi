<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .title { font: 700 28px 'Noto Sans CJK KR', 'Noto Sans KR', Arial, sans-serif; fill: #111; }
      .label { font: 700 20px 'Noto Sans CJK KR', 'Noto Sans KR', Arial, sans-serif; fill: #111; }
      .small { font: 400 18px 'Noto Sans CJK KR', 'Noto Sans KR', Arial, sans-serif; fill: #111; }
      .boxtext { font: 700 18px 'Noto Sans CJK KR', 'Noto Sans KR', Arial, sans-serif; fill: #0b1a2b; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="#ffffff"/>
  <text x="40" y="60" class="title">핵심 로직 옵션: 중앙 할당 vs 비딩(입찰)</text>

  <text x="40" y="125" class="label">A) 중앙 할당(Managed)</text>
  <rect x="60" y="160" width="260" height="120" rx="18" fill="#EEF5FF" stroke="#2F5E9E" stroke-width="3"/>
  <text x="190" y="220" text-anchor="middle" class="boxtext">고객</text>
  <text x="190" y="250" text-anchor="middle" class="small">(의뢰)</text>

  <rect x="370" y="160" width="260" height="120" rx="18" fill="#EEF5FF" stroke="#2F5E9E" stroke-width="3"/>
  <text x="500" y="220" text-anchor="middle" class="boxtext">플랫폼</text>
  <text x="500" y="250" text-anchor="middle" class="small">(분류/견적)</text>

  <rect x="680" y="160" width="260" height="120" rx="18" fill="#EEF5FF" stroke="#2F5E9E" stroke-width="3"/>
  <text x="810" y="220" text-anchor="middle" class="boxtext">법무법인</text>
  <text x="810" y="250" text-anchor="middle" class="small">(수행)</text>

  <line x1="320" y1="220" x2="370" y2="220" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="630" y1="220" x2="680" y2="220" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 810 280 C 810 340, 500 340, 500 280" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 500 280 C 500 340, 190 340, 190 280" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="500" y="365" text-anchor="middle" class="small">상태/문서 업데이트</text>

  <text x="40" y="455" class="label">B) 비딩(마켓플레이스)</text>
  <rect x="60" y="490" width="260" height="120" rx="18" fill="#EAF7EA" stroke="#2B7A2B" stroke-width="3"/>
  <text x="190" y="550" text-anchor="middle" class="boxtext">고객</text>
  <text x="190" y="580" text-anchor="middle" class="small">(의뢰)</text>

  <rect x="370" y="490" width="260" height="120" rx="18" fill="#EAF7EA" stroke="#2B7A2B" stroke-width="3"/>
  <text x="500" y="550" text-anchor="middle" class="boxtext">플랫폼</text>
  <text x="500" y="580" text-anchor="middle" class="small">(공고/매칭)</text>

  <rect x="680" y="490" width="260" height="120" rx="18" fill="#EAF7EA" stroke="#2B7A2B" stroke-width="3"/>
  <text x="810" y="550" text-anchor="middle" class="boxtext">여러 법무법인</text>
  <text x="810" y="580" text-anchor="middle" class="small">(입찰)</text>

  <line x1="320" y1="550" x2="370" y2="550" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="630" y1="550" x2="680" y2="550" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="655" y="520" text-anchor="middle" class="small">견적/제안</text>

  <path d="M 810 610 C 810 650, 500 650, 500 610" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="650" y="675" text-anchor="middle" class="small">선정/계약</text>

</svg>
