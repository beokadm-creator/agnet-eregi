schemaVersion: 0.2
title: "파트너(입점) 프로필 스키마 — 법무사/법무법인/법률사무소"
description: >
  ‘다방/직방’처럼 많은 영세 사무소가 입점하는 전제를 두되,
  AI 오케스트레이션(후보 추출/정렬/추천/견적)과 책임 분리를 위해
  파트너 정보를 표준화한다.

enums:
  partnerType: ["법무사사무소", "법무법인", "법률사무소"]
  verificationStatus: ["basic", "verified", "pro"]   # 등급(노출/광고 가능 여부와 연결)
  serviceMode: ["완전비대면", "혼합(일부오프라인)", "대면필요"]
  contactChannel: ["platform_chat", "phone", "email", "kakao"]
  paymentMode: ["platform_payment_only", "platform_or_offline", "offline_only"]
  regionCode: ["SEOUL","BUSAN","DAEGU","INCHEON","GWANGJU","DAEJEON","ULSAN","SEJONG",
               "GYEONGGI","GANGWON","CHUNGBUK","CHUNGNAM","JEONBUK","JEONNAM","GYEONGBUK","GYEONGNAM","JEJU"]
  currency: ["KRW"]

partnerProfile:
  id: "P-000001"
  type: "법무사사무소"
  status:
    verification: "basic"
    active: true
    onboardingStage: "submitted|reviewing|approved|rejected"
    lastVerifiedAt: null

  # A) 신원/자격/사업자(검증)
  identity:
    displayNameKo: "OO법무사사무소"
    legalNameKo: "OO법무사사무소"
    businessRegistrationNo: "000-00-00000"
    officeAddressKo: "서울특별시 …"
    phone: "02-000-0000"
    email: "ops@example.com"
    website: null

    # 지도/방문(직방/다방 감성)
    visitable:
      allowInPersonVisit: true
      bookingRequired: true
      bookingUrl: null
      businessHours:
        weekday: "09:00-18:00"
        saturday: "휴무|09:00-13:00"
        sundayHoliday: "휴무"
    map:
      lat: null
      lng: null
      subwayProximity: null
      parkingInfoKo: null

    practitioners:
      # 최소 1명 이상(세부 개인정보는 플랫폼 내부 저장, 외부 노출은 요약)
      - role: "대표|담당"
        nameKo: "홍길동"
        licenseType: "법무사|변호사"
        licenseNo: null
        yearsExperience: null

  # B) 제공 서비스 범위(사건팩 카탈로그와 매핑)
  capabilities:
    supportedCasePacks:
      - "corp.incorporation"
      - "corp.officer_change"
      - "corp.hq_move"
      - "collateral.movable.create"
      - "collateral.movable.change"
      - "collateral.movable.release"
      - "collateral.claim.create"
      - "collateral.claim.change"
      - "collateral.claim.release"
    excludedCaseFlags:
      # 예: 외국인 포함, 분쟁 동반 등
      - "LEGAL_DISPUTE"
    regions:
      primary: ["SEOUL","GYEONGGI"]
      secondary: []

  # C) 온라인 처리 가능 범위(플랫폼 내 완료율을 좌우)
  process:
    serviceMode: "혼합(일부오프라인)"
    supportedChannels: ["platform_chat", "phone"]
    paymentMode: "platform_payment_only"
    eSignSupported: true
    eFilingSupported: true
    offlineDocumentRequired:
      # 원본이 반드시 필요한 사건/조건
      default: false
      rules: []

  # D) SLA/리드타임(정렬/추천/ETA에 사용)
  sla:
    startTime:
      targetMinutes: 60
      avgMinutes30d: null
      breachRate30d: null
    completionTime:
      # 사건팩별 평균/상한(없으면 플랫폼 기본값 사용)
      byCasePack:
        corp.incorporation: { avgHours90d: 72, p90Hours90d: 120 }
        corp.officer_change: { avgHours90d: 72, p90Hours90d: 120 }
        corp.hq_move: { avgHours90d: 72, p90Hours90d: 120 }
    escalationAgreement:
      acceptsAutoEscalation: true
      acceptsReassignmentOnBreach: true

  # E) 수용량/가용성(지금 가능한 곳만 보여주기 위함)
  capacity:
    dailyLimit: 10
    currentOpenCases: 0
    acceptsNewCases: true
    vacationMode: false

  # F) 가격 규칙(견적 엔진의 핵심)
  pricing:
    model: "rule_based"     # rule_based | manual_quote_only
    currency: "KRW"
    casePackPriceRulesRef: "pricing/P-000001.yaml"   # 별도 파일로 분리 권장
    transparency:
      includesKo: ["서류 검토", "온라인 커뮤니케이션", "진행상황 업데이트"]
      excludesKo: ["법정비용(실비)"]
      disclaimerKo: "최종 금액은 서류 검토 후 확정될 수 있습니다."

  # G) 품질/성과(플랫폼이 생성/관리)
  quality:
    rating5: null
    reworkRate30d: null
    disputeRate90d: null
    completionSuccessRate90d: null
    customerNps: null
    internalGrade: "new|standard|premium"

  # H) 컴플라이언스/책임 분리 동의(플랫폼 사업자 방어의 핵심)
  compliance:
    termsAcceptedAt: "2026-01-01T00:00:00Z"
    dataProcessingAgreementAcceptedAt: "2026-01-01T00:00:00Z"
    platformRoleAcknowledgement:
      # 플랫폼은 법률서비스 제공자가 아니라 시스템 제공자
      acknowledged: true
      textVersion: "role-separation-v1"
    advertisingPolicy:
      # 스폰서 노출(광고) 참여 의사
      eligibleForAds: false
      adsStatus: "off|on|suspended"
      adsBudgetMonthly: null
      adDisclosureAcknowledged: true

  # AI 추천/나열을 위한 메타(검색/카드/지도)
  aiIndex:
    tagsKo: ["법인등기", "임원변경", "전문", "빠른처리"]
    summaryKo: "법인 설립/변경 등기 중심. 전자서명/전자신청 가능."
    highlightsKo:
      - "평균 착수 1시간 이내"
      - "온라인 진행상황 실시간"

