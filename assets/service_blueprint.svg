<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .title { font: 700 28px 'Noto Sans CJK KR', 'Noto Sans KR', Arial, sans-serif; fill: #111; }
      .label { font: 700 20px 'Noto Sans CJK KR', 'Noto Sans KR', Arial, sans-serif; fill: #111; }
      .small { font: 400 18px 'Noto Sans CJK KR', 'Noto Sans KR', Arial, sans-serif; fill: #111; }
      .boxtext { font: 700 18px 'Noto Sans CJK KR', 'Noto Sans KR', Arial, sans-serif; fill: #0b1a2b; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="#ffffff"/>
  <text x="40" y="60" class="title">등기 대행 플랫폼 서비스 블루프린트(예시)</text>

  <text x="60" y="140" class="label">고객</text>
  <line x1="60" y1="160" x2="1140" y2="160" stroke="#DDD" stroke-width="2"/>
  <text x="60" y="300" class="label">플랫폼</text>
  <line x1="60" y1="320" x2="1140" y2="320" stroke="#DDD" stroke-width="2"/>
  <text x="60" y="460" class="label">법무법인</text>
  <line x1="60" y1="480" x2="1140" y2="480" stroke="#DDD" stroke-width="2"/>

  <!-- step columns -->
  <g>
    <rect x="150" y="190" width="160" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <rect x="150" y="350" width="160" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <rect x="150" y="510" width="160" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <text x="230" y="228" text-anchor="middle" class="small">사건 입력</text>
    <text x="230" y="252" text-anchor="middle" class="small">(서류/정보)</text>
  </g>

  <g>
    <rect x="380" y="190" width="160" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <rect x="380" y="350" width="160" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <rect x="380" y="510" width="160" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <text x="460" y="228" text-anchor="middle" class="small">자동 분류</text>
    <text x="460" y="252" text-anchor="middle" class="small">+ 체크리스트</text>
  </g>

  <g>
    <rect x="610" y="190" width="160" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <rect x="610" y="350" width="160" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <rect x="610" y="510" width="160" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <text x="690" y="228" text-anchor="middle" class="small">견적/수임</text>
    <text x="690" y="252" text-anchor="middle" class="small">(할당/비딩)</text>
  </g>

  <g>
    <rect x="840" y="190" width="160" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <rect x="840" y="350" width="160" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <rect x="840" y="510" width="160" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <text x="920" y="228" text-anchor="middle" class="small">진행/피드백</text>
    <text x="920" y="252" text-anchor="middle" class="small">(온라인 컨택)</text>
  </g>

  <g>
    <rect x="1050" y="190" width="120" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <rect x="1050" y="350" width="120" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <rect x="1050" y="510" width="120" height="80" rx="14" fill="#fff" stroke="#666" stroke-width="2"/>
    <text x="1110" y="240" text-anchor="middle" class="small">완료</text>
  </g>

  <!-- dashed vertical connectors -->
  <line x1="230" y1="170" x2="230" y2="610" stroke="#BBB" stroke-width="2" stroke-dasharray="6,6"/>
  <line x1="460" y1="170" x2="460" y2="610" stroke="#BBB" stroke-width="2" stroke-dasharray="6,6"/>
  <line x1="690" y1="170" x2="690" y2="610" stroke="#BBB" stroke-width="2" stroke-dasharray="6,6"/>
  <line x1="920" y1="170" x2="920" y2="610" stroke="#BBB" stroke-width="2" stroke-dasharray="6,6"/>
  <line x1="1110" y1="170" x2="1110" y2="610" stroke="#BBB" stroke-width="2" stroke-dasharray="6,6"/>

  <text x="40" y="670" class="small">핵심: 표준화(서류/체크리스트) + 신뢰(품질/책임) + 운영효율(SLA/자동화)</text>

</svg>
